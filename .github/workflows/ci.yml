name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  # ── Python Lint ──────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.13"
      - run: uv sync --all-extras
      - run: uv pip install ruff
      - run: uv run ruff check src/
      - run: uv run ruff format --check src/

  # ── Type Checking ────────────────────────────────────────────────
  typecheck:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.13"
      - run: uv sync --all-extras
      - run: uv pip install mypy
      - run: uv run mypy src/rwmod/

  # ── Tests + Coverage ────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.13"
      - run: uv sync --all-extras
      - run: uv run pytest -m "not network" --cov=rwmod --cov-report=xml --cov-report=term-missing
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ── Security Scan ───────────────────────────────────────────────
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.13"
      - run: uv sync --all-extras
      - run: uv pip install bandit pip-audit
      - run: uv run bandit -c pyproject.toml -r src/
      - run: uv run pip-audit

  # ── Code Quality ────────────────────────────────────────────────
  quality:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.13"
      - run: uv sync --all-extras
      - run: uv pip install radon
      - name: Cyclomatic complexity check
        run: |
          uv run radon cc src/rwmod -s -n C || {
            echo "::warning::Complex functions detected (grade C or worse)"
          }

  # ── Frontend Check ──────────────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install & type-check
        working-directory: frontend
        run: |
          npm install
          npx tsc --noEmit

  # ── Docker Build ────────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [lint, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t rwmod:ci .
